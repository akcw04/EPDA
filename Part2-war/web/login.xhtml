<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>APU-ASC Login</title>
        <h:outputStylesheet name="css/style.css" />
    </h:head>
    <h:body>
        <div class="login-page">
            <div class="login-card">
                <h:form id="loginForm">
                    <h2>APU Automotive Service Centre</h2>
                    <p class="subtitle">Enterprise Service Management System</p>

                    <p:messages id="msgs" showDetail="false" closable="true" styleClass="login-messages"/>

                    <div class="field">
                        <label for="loginForm:email">Email</label>
                        <p:inputText id="email" value="#{loginBean.email}"
                                     required="true" requiredMessage="Email is required"
                                     placeholder="Enter your email"/>
                    </div>

                    <div class="field">
                        <label for="loginForm:password">Password</label>
                        <p:password id="password" value="#{loginBean.password}"
                                    required="true" requiredMessage="Password is required"
                                    placeholder="Enter your password"/>
                    </div>

                    <p:commandButton value="Sign In" action="#{loginBean.login}"
                                     ajax="false" styleClass="login-btn"/>
                </h:form>

                <div class="login-footer">
                    <p><strong>Test Credentials</strong></p>
                    <p>Manager: admin@asc.com / admin123</p>
                    <p>Counter Staff: staff@asc.com / staff123</p>
                    <p>Technician: ali@asc.com / tech123</p>
                    <p>Customer: david@cust.com / cust123</p>
                </div>
            </div>
        </div>
    </h:body>
</html>
