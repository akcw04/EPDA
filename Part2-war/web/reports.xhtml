<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Reports - EPDA System</title>
        <h:outputStylesheet library="css" name="style.css"/>
        <f:metadata>
            <f:viewAction action="#{reportBean.init}"/>
        </f:metadata>
    </h:head>
    <h:body>
        <h:form>
            <p:menubar>
                <p:menuitem value="Home" outcome="index"/>
                <p:menuitem value="Appointments" outcome="appointments"/>
                <p:menuitem value="Users" outcome="users"/>
                <p:menuitem value="Services" outcome="services"/>
                <p:menuitem value="Reports" outcome="reports"/>
            </p:menubar>
        </h:form>

        <div class="container">
            <h1>Business Reports &amp; Analytics</h1>

            <h:form id="reportForm" rendered="#{reportBean != null}">
                <!-- Messages -->
                <p:messages id="messages" showDetail="true"><p:autoUpdate /></p:messages>

                <!-- Refresh Button -->
                <p:commandButton value="Refresh All Reports" action="#{reportBean.refreshAllReports}"
                                update="@form"
                                style="margin-bottom: 20px;"/>

                <!-- REPORT 1: Daily Revenue -->
                <p:panel id="dailyRevenuePanel" header="Report 1: Daily Revenue (Today)" style="margin-bottom: 20px;">
                    <h:panelGrid columns="2">
                        <h:outputText value="Total Revenue (Completed Appointments):"/>
                        <h:outputText value="#{reportBean.dailyRevenue}">
                            <f:convertNumber type="currency"/>
                        </h:outputText>
                    </h:panelGrid>
                </p:panel>

                <!-- REPORT 2: Technician Workload -->
                <p:panel id="workloadPanel" header="Report 2: Technician Workload (Active Tasks)" style="margin-bottom: 20px;">
                    <p:dataTable value="#{reportBean.technicianWorkload.entrySet().toArray()}" var="entry" 
                                emptyMessage="No active tasks">
                        <p:column headerText="Technician ID">
                            <h:outputText value="#{entry.key}"/>
                        </p:column>
                        <p:column headerText="Active Tasks (Pending + InProgress)">
                            <h:outputText value="#{entry.value}"/>
                        </p:column>
                    </p:dataTable>
                </p:panel>

                <!-- REPORT 3: Service Popularity -->
                <p:panel id="popularityPanel" header="Report 3: Service Popularity (Booking Distribution)" style="margin-bottom: 20px;">
                    <p:dataTable value="#{reportBean.servicePopularity.entrySet().toArray()}" var="entry" 
                                emptyMessage="No services booked">
                        <p:column headerText="Service Name">
                            <h:outputText value="#{entry.key}"/>
                        </p:column>
                        <p:column headerText="Number of Bookings">
                            <h:outputText value="#{entry.value}"/>
                        </p:column>
                    </p:dataTable>
                </p:panel>

                <!-- REPORT 4: Customer Feedback -->
                <p:panel id="feedbackPanel" header="Report 4: Customer Feedback (Ratings &amp; Comments)" style="margin-bottom: 20px;">
                    <p:dataTable value="#{reportBean.customerFeedback}" var="feedback" 
                                paginator="true" rows="10" emptyMessage="No feedback available">
                        <p:column headerText="Customer Name">
                            <h:outputText value="#{feedback['customerName']}"/>
                        </p:column>
                        <p:column headerText="Rating">
                            <h:outputText value="#{feedback['rating']}" rendered="#{feedback['rating'] != null}"/>
                            <h:outputText value="--" rendered="#{feedback['rating'] == null}"/>
                        </p:column>
                        <p:column headerText="Comments">
                            <h:outputText value="#{feedback['comments']}" rendered="#{feedback['comments'] != null}"/>
                            <h:outputText value="--" rendered="#{feedback['comments'] == null}"/>
                        </p:column>
                    </p:dataTable>
                </p:panel>

                <!-- REPORT 5: Status Analytics -->
                <p:panel id="analyticsPanel" header="Report 5: Status Analytics (Appointment Status Distribution)" style="margin-bottom: 20px;">
                    <h:panelGrid columns="3" style="width: 100%;">
                        <h:panelGroup>
                            <h:outputText value="Pending: "/>
                            <h:outputText value="#{reportBean.statusAnalytics['pending']}"/>
                        </h:panelGroup>
                        <h:panelGroup>
                            <h:outputText value="In Progress: "/>
                            <h:outputText value="#{reportBean.statusAnalytics['inProgress']}"/>
                        </h:panelGroup>
                        <h:panelGroup>
                            <h:outputText value="Completed: "/>
                            <h:outputText value="#{reportBean.statusAnalytics['completed']}"/>
                        </h:panelGroup>
                        <h:panelGroup>
                            <h:outputText value="Cancelled: "/>
                            <h:outputText value="#{reportBean.statusAnalytics['cancelled']}"/>
                        </h:panelGroup>
                        <h:panelGroup>
                            <h:outputText value="Total: "/>
                            <h:outputText value="#{reportBean.statusAnalytics['total']}"/>
                        </h:panelGroup>
                        <h:outputText value=""/>
                    </h:panelGrid>

                    <h:panelGrid columns="2" style="margin-top: 15px;">
                        <h:outputText value="Pending Ratio:"/>
                        <h:outputText value="#{reportBean.statusAnalytics['pendingRatio']}">
                            <f:convertNumber pattern="0.00%"/>
                        </h:outputText>
                        <h:outputText value="Completed Ratio:"/>
                        <h:outputText value="#{reportBean.statusAnalytics['completedRatio']}">
                            <f:convertNumber pattern="0.00%"/>
                        </h:outputText>
                    </h:panelGrid>
                </p:panel>
            </h:form>
        </div>
    </h:body>
</html>
