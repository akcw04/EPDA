<?xml version="1.0" encoding="UTF-8"?>
<!--
    Manager Dashboard - shell only.

    The sidebar drives managerBean.currentSection. Each section is a separate
    .xhtml file under /manager/sections/ and is pulled in via <ui:include>.
    Only the active section renders, but component IDs inside every include
    are unique across the whole dashboard.
-->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <f:metadata>
        <f:event type="preRenderView" listener="#{managerBean.init()}" />
    </f:metadata>

    <h:head>
        <title>Manager Dashboard - APU Automotive Service Centre</title>
        <h:outputStylesheet name="css/style.css" />
    </h:head>

    <h:body>
        <div class="dashboard">

            <!-- ==================== SIDEBAR ==================== -->
            <div class="sidebar">
                <div class="sidebar-brand">
                    <h2>APU-ASC</h2>
                    <span>Manager Portal</span>
                </div>

                <h:form id="sidebarForm">
                    <nav class="sidebar-nav">

                        <!-- Main -->
                        <div class="nav-section">Main</div>
                        <p:commandButton value="Overview"
                                         icon="pi pi-home"
                                         styleClass="nav-link #{managerBean.currentSection == 'overview' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('overview')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Staff Management -->
                        <div class="nav-section">Staff Management</div>
                        <p:commandButton value="Register Staff"
                                         icon="pi pi-user-plus"
                                         styleClass="nav-link #{managerBean.currentSection == 'register-staff' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('register-staff')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Technicians"
                                         icon="pi pi-wrench"
                                         styleClass="nav-link #{managerBean.currentSection == 'technicians' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('technicians')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Counter Staff"
                                         icon="pi pi-users"
                                         styleClass="nav-link #{managerBean.currentSection == 'counter-staff' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('counter-staff')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Managers"
                                         icon="pi pi-shield"
                                         styleClass="nav-link #{managerBean.currentSection == 'managers' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('managers')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Customers"
                                         icon="pi pi-user"
                                         styleClass="nav-link #{managerBean.currentSection == 'customers' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('customers')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Operations -->
                        <div class="nav-section">Operations</div>
                        <p:commandButton value="Services &amp; Pricing"
                                         icon="pi pi-tag"
                                         styleClass="nav-link #{managerBean.currentSection == 'services' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('services')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Appointments"
                                         icon="pi pi-calendar"
                                         styleClass="nav-link #{managerBean.currentSection == 'appointments' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('appointments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Feedback &amp; Comments"
                                         icon="pi pi-comments"
                                         styleClass="nav-link #{managerBean.currentSection == 'feedback' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('feedback')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Analytics -->
                        <div class="nav-section">Analytics</div>
                        <p:commandButton value="Reports"
                                         icon="pi pi-chart-bar"
                                         styleClass="nav-link #{managerBean.currentSection == 'reports' ? 'active' : ''}"
                                         action="#{managerBean.navigateTo('reports')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                    </nav>
                </h:form>

                <div class="sidebar-footer">
                    <span>#{loginBean.userName}</span>
                    <span>Manager</span>
                    <h:form>
                        <p:commandButton value="Logout"
                                         icon="pi pi-sign-out"
                                         styleClass="logout-btn"
                                         action="#{loginBean.logout()}" />
                    </h:form>
                </div>
            </div>

            <!-- ==================== MAIN CONTENT ==================== -->
            <div class="main-content">
                <div class="top-bar">
                    <h:panelGroup id="pageTitle" layout="block">
                        <h1>
                            <h:outputText value="Overview" rendered="#{managerBean.currentSection == 'overview'}" />
                            <h:outputText value="Register Staff" rendered="#{managerBean.currentSection == 'register-staff'}" />
                            <h:outputText value="Technicians" rendered="#{managerBean.currentSection == 'technicians'}" />
                            <h:outputText value="Counter Staff" rendered="#{managerBean.currentSection == 'counter-staff'}" />
                            <h:outputText value="Managers" rendered="#{managerBean.currentSection == 'managers'}" />
                            <h:outputText value="Customers" rendered="#{managerBean.currentSection == 'customers'}" />
                            <h:outputText value="Services &amp; Pricing" rendered="#{managerBean.currentSection == 'services'}" />
                            <h:outputText value="Appointments" rendered="#{managerBean.currentSection == 'appointments'}" />
                            <h:outputText value="Feedback &amp; Comments" rendered="#{managerBean.currentSection == 'feedback'}" />
                            <h:outputText value="Reports" rendered="#{managerBean.currentSection == 'reports'}" />
                        </h1>
                    </h:panelGroup>
                </div>

                <div class="content-area">
                    <h:panelGroup id="contentArea">
                        <p:growl id="growl" showDetail="true" life="4000" />
                        <h:form id="mainForm">

                            <!-- Each section is its own file under /manager/sections/.
                                 Only the one matching currentSection renders. -->

                            <h:panelGroup rendered="#{managerBean.currentSection == 'overview'}">
                                <ui:include src="sections/overview.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'register-staff'}">
                                <ui:include src="sections/register-staff.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'technicians'}">
                                <ui:include src="sections/technicians.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'counter-staff'}">
                                <ui:include src="sections/counter-staff.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'managers'}">
                                <ui:include src="sections/managers.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'customers'}">
                                <ui:include src="sections/customers.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'services'}">
                                <ui:include src="sections/services.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'appointments'}">
                                <ui:include src="sections/appointments.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'feedback'}">
                                <ui:include src="sections/feedback.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{managerBean.currentSection == 'reports'}">
                                <ui:include src="sections/reports.xhtml" />
                            </h:panelGroup>

                        </h:form>
                    </h:panelGroup>
                </div>
            </div>

        </div>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <p:commandButton value="Yes" type="button" styleClass="btn-danger ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="btn-secondary ui-confirmdialog-no" icon="pi pi-times" />
        </p:confirmDialog>

        <script type="text/javascript">
            //<![CDATA[
            function filterTable() {
                var input = document.getElementById("#{facesContext.viewRoot.findComponent('mainForm:searchInput').clientId}");
                var filter = input.value.toLowerCase();
                var table = document.getElementById("#{facesContext.viewRoot.findComponent('mainForm:staffTable').clientId}");
                var trs = table.getElementsByTagName("tr");

                // Start from 1 to skip the header row
                for (var i = 1; i < trs.length; i++) {
                    var tds = trs[i].getElementsByTagName("td");
                    var show = false;
                    for (var j = 0; j < tds.length; j++) {
                        if (tds[j].textContent.toLowerCase().indexOf(filter) > -1) {
                            show = true;
                            break;
                        }
                    }
                    trs[i].style.display = show ? "" : "none";
                }
            }
            //]]>
        </script>
    </h:body>
</html>
