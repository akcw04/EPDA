<?xml version="1.0" encoding="UTF-8"?>
<!--
    Manager > Overview
    Top-level KPI stat cards for the whole workshop.
-->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets">

    <div class="stats-row">
        <div class="stat-card">
            <h3>Total Services</h3>
            <p>#{managerBean.totalServices}</p>
        </div>
        <div class="stat-card accent-green">
            <h3>Technicians</h3>
            <p>#{managerBean.totalTechnicians}</p>
        </div>
        <div class="stat-card accent-orange">
            <h3>Counter Staff</h3>
            <p>#{managerBean.totalCounterStaff}</p>
        </div>
        <div class="stat-card accent-purple">
            <h3>Customers</h3>
            <p>#{managerBean.totalCustomers}</p>
        </div>
        <div class="stat-card accent-red">
            <h3>Pending Appointments</h3>
            <p>#{managerBean.pendingAppointments}</p>
        </div>
    </div>

</ui:composition>
