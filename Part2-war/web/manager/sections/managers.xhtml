<?xml version="1.0" encoding="UTF-8"?>
<!--
    Manager > Managers
    Search, edit, delete other manager accounts in the system.
-->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets">

    <div class="search-bar">
        <p:inputText value="#{managerBean.searchKeyword}" styleClass="form-control" placeholder="Search by name, email..."/>
        <p:commandButton value="Search"
                         icon="pi pi-search"
                         styleClass="btn-primary"
                         action="#{managerBean.searchStaff()}"
                         process="@form"
                         update=":mainForm" />
        <p:commandButton value="Clear"
                         icon="pi pi-times"
                         styleClass="btn-secondary"
                         action="#{managerBean.clearSearch()}"
                         process="@this"
                         update=":mainForm" />
    </div>

    <div class="panel">
        <p:dataTable value="#{managerBean.managers}" var="m"
                     emptyMessage="No managers found.">
            <p:column headerText="ID">
                <h:outputText value="#{m.id}" />
            </p:column>
            <p:column headerText="Name">
                <h:outputText value="#{m.name}" />
            </p:column>
            <p:column headerText="Email">
                <h:outputText value="#{m.email}" />
            </p:column>
            <p:column headerText="Phone">
                <h:outputText value="#{m.phone}" />
            </p:column>
            <p:column headerText="Actions" styleClass="actions-column">
                <p:commandButton value="Edit"
                                 icon="pi pi-pencil"
                                 styleClass="btn-edit"
                                 action="#{managerBean.loadEditManager(m.id)}"
                                 process="@this"
                                 update=":mainForm" />
                <p:commandButton value="Delete"
                                 icon="pi pi-trash"
                                 styleClass="btn-danger"
                                 action="#{managerBean.deleteManager(m.id)}"
                                 process="@this"
                                 update=":mainForm :growl">
                    <p:confirm header="Confirm" message="Delete this manager?" icon="pi pi-exclamation-triangle" />
                </p:commandButton>
            </p:column>
        </p:dataTable>
    </div>

    <!-- Edit Manager Panel -->
    <h:panelGroup rendered="#{managerBean.editingManager != null}">
        <div class="edit-panel">
            <h3>Edit Manager</h3>
            <div class="form-grid">
                <div>
                    <label>Name</label>
                    <h:inputText value="#{managerBean.editingManager.name}" styleClass="form-control" />
                </div>
                <div>
                    <label>Email</label>
                    <h:inputText value="#{managerBean.editingManager.email}" styleClass="form-control" />
                </div>
                <div>
                    <label>Phone</label>
                    <h:inputText value="#{managerBean.editingManager.phone}" styleClass="form-control" />
                </div>
                <div>
                    <label>Gender</label>
                    <p:selectOneMenu value="#{managerBean.editingManager.gender}" styleClass="form-control">
                        <f:selectItem itemValue="M" itemLabel="Male" />
                        <f:selectItem itemValue="F" itemLabel="Female" />
                        <f:selectItem itemValue="Other" itemLabel="Other" />
                    </p:selectOneMenu>
                </div>
                <div>
                    <label>IC</label>
                    <h:inputText value="#{managerBean.editingManager.ic}" styleClass="form-control" />
                </div>
                <div>
                    <label>Address</label>
                    <h:inputTextarea value="#{managerBean.editingManager.address}" styleClass="form-control" rows="3" />
                </div>
            </div>
            <div class="form-actions">
                <p:commandButton value="Save Changes"
                                 icon="pi pi-check"
                                 styleClass="btn-success"
                                 action="#{managerBean.saveEditManager()}"
                                 process="@form"
                                 update=":mainForm :growl" />
                <p:commandButton value="Cancel"
                                 icon="pi pi-times"
                                 styleClass="btn-secondary"
                                 action="#{managerBean.setEditingManager(null)}"
                                 update=":mainForm"
                                 process="@this" />
            </div>
        </div>
    </h:panelGroup>

</ui:composition>
