<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Services - EPDA System</title>
        <h:outputStylesheet library="css" name="style.css"/>
    </h:head>
    <h:body>
        <h:form>
            <p:menubar>
                <p:menuitem value="Home" outcome="index"/>
                <p:menuitem value="Appointments" outcome="appointments"/>
                <p:menuitem value="Users" outcome="users"/>
                <p:menuitem value="Services" outcome="services"/>
                <p:menuitem value="Reports" outcome="reports"/>
            </p:menubar>
        </h:form>

        <div class="container">
            <h1>Service Management</h1>

            <h:form id="serviceForm" rendered="#{serviceBean != null}">
                <!-- Messages -->
                <p:messages id="messages" showDetail="true"><p:autoUpdate /></p:messages>

                <!-- Add New Service Form -->
                <p:panel header="Add New Service" style="margin-bottom: 20px;">
                    <p:panelGrid columns="2" layout="grid" columnClasses="ui-grid-col-4, ui-grid-col-8">
                        <p:outputLabel for="serviceName" value="Service Name:"/>
                        <p:inputText id="serviceName" value="#{serviceBean.currentService.serviceName}" required="true"/>

                        <p:outputLabel for="serviceType" value="Service Type:"/>
                        <p:selectOneMenu id="serviceType" value="#{serviceBean.currentService.type}" required="true">
                            <f:selectItem itemLabel="-- Select Type --" itemValue="#{null}"/>
                            <f:selectItem itemLabel="Normal (1 hour)" itemValue="Normal"/>
                            <f:selectItem itemLabel="Major (3 hours)" itemValue="Major"/>
                        </p:selectOneMenu>

                        <p:outputLabel for="basePrice" value="Base Price ($):"/>
                        <p:inputNumber id="basePrice" value="#{serviceBean.currentService.basePrice}" 
                                      required="true" decimalPlaces="2" minValue="0"/>
                    </p:panelGrid>
                    <p:commandButton value="Save Service"
                                    action="#{serviceBean.createService}"
                                    update="@form"/>
                </p:panel>

                <!-- Filter by Type -->
                <p:panel header="Filter Services" style="margin-bottom: 20px;">
                    <p:selectOneRadio value="#{serviceBean.filterType}">
                        <f:selectItem itemLabel="All Services" itemValue="All"/>
                        <f:selectItem itemLabel="Normal (1 hour)" itemValue="Normal"/>
                        <f:selectItem itemLabel="Major (3 hours)" itemValue="Major"/>
                        <p:ajax update="@form"/>
                    </p:selectOneRadio>
                </p:panel>

                <!-- Services Table -->
                <p:panel header="Services List">
                    <p:dataTable id="servicesTable" var="svc" value="#{serviceBean.filteredServices}" 
                                paginator="true" rows="10" emptyMessage="No services found">
                        <p:column headerText="ID">
                            <h:outputText value="#{svc.id}"/>
                        </p:column>
                        <p:column headerText="Service Name">
                            <h:outputText value="#{svc.serviceName}"/>
                        </p:column>
                        <p:column headerText="Type">
                            <h:outputText value="#{svc.type}"/>
                        </p:column>
                        <p:column headerText="Duration">
                            <h:outputText value="#{svc.durationMinutes} minutes"/>
                        </p:column>
                        <p:column headerText="Base Price">
                            <h:outputText value="#{svc.basePrice}">
                                <f:convertNumber type="currency"/>
                            </h:outputText>
                        </p:column>
                        <p:column headerText="Actions">
                            <h:commandLink value="Edit" action="#{serviceBean.editService(svc)}"/>
                            <h:outputText value=" | "/>
                            <h:commandLink value="Delete" action="#{serviceBean.deleteService(svc.id)}"
                                          onclick="if(!confirm('Are you sure?')) return false;"/>
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </h:form>
        </div>
    </h:body>
</html>
