<?xml version="1.0" encoding="UTF-8"?>
<!--
    Counter Staff Dashboard - shell only.

    Sidebar drives counterStaffBean.currentSection; matching section files
    under /counterstaff/sections/ are pulled in via <ui:include>.
-->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <f:metadata>
        <f:event type="preRenderView" listener="#{counterStaffBean.init()}" />
    </f:metadata>

    <h:head>
        <title>Counter Staff Dashboard - APU ASC</title>
        <h:outputStylesheet name="css/style.css" />
    </h:head>

    <h:body>
        <div class="dashboard">

            <!-- ==================== SIDEBAR ==================== -->
            <div class="sidebar">
                <div class="sidebar-brand">
                    <h2>APU-ASC</h2>
                    <span>Counter Staff Portal</span>
                </div>

                <h:form id="sidebarForm">
                    <nav class="sidebar-nav">

                        <!-- Main -->
                        <div class="nav-section">Main</div>
                        <p:commandButton value="Overview"
                                         icon="pi pi-home"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'overview' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('overview')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="My Profile"
                                         icon="pi pi-id-card"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'profile' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('profile')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Customer Management -->
                        <div class="nav-section">Customer Management</div>
                        <p:commandButton value="Register Customer"
                                         icon="pi pi-user-plus"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'register-customer' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('register-customer')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Customers"
                                         icon="pi pi-users"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'customers' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('customers')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Operations -->
                        <div class="nav-section">Operations</div>
                        <p:commandButton value="Book Appointment"
                                         icon="pi pi-calendar-plus"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'book-appointment' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('book-appointment')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Payment &amp; Receipt"
                                         icon="pi pi-wallet"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'payment' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('payment')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Appointments"
                                         icon="pi pi-calendar"
                                         styleClass="nav-link #{counterStaffBean.currentSection == 'appointments' ? 'active' : ''}"
                                         action="#{counterStaffBean.navigateTo('appointments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                    </nav>
                </h:form>

                <div class="sidebar-footer">
                    <span>#{loginBean.userName}</span>
                    <span>Counter Staff</span>
                    <h:form>
                        <p:commandButton value="Logout"
                                         icon="pi pi-sign-out"
                                         styleClass="logout-btn"
                                         action="#{loginBean.logout()}" />
                    </h:form>
                </div>
            </div>

            <!-- ==================== MAIN CONTENT ==================== -->
            <div class="main-content">
                <div class="top-bar">
                    <h:panelGroup id="pageTitle" layout="block">
                        <h1>
                            <h:outputText value="Overview" rendered="#{counterStaffBean.currentSection == 'overview'}" />
                            <h:outputText value="My Profile" rendered="#{counterStaffBean.currentSection == 'profile'}" />
                            <h:outputText value="Register Customer" rendered="#{counterStaffBean.currentSection == 'register-customer'}" />
                            <h:outputText value="Customers" rendered="#{counterStaffBean.currentSection == 'customers'}" />
                            <h:outputText value="Book Appointment" rendered="#{counterStaffBean.currentSection == 'book-appointment'}" />
                            <h:outputText value="Payment &amp; Receipt" rendered="#{counterStaffBean.currentSection == 'payment'}" />
                            <h:outputText value="Appointments" rendered="#{counterStaffBean.currentSection == 'appointments'}" />
                        </h1>
                    </h:panelGroup>
                </div>

                <div class="content-area">
                    <h:panelGroup id="contentArea">
                        <p:growl id="growl" showDetail="true" life="4000" />
                        <h:form id="mainForm">

                            <!-- Each section is its own file under /counterstaff/sections/.
                                 Only the one matching currentSection renders. -->

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'overview'}">
                                <ui:include src="sections/overview.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'profile'}">
                                <ui:include src="sections/profile.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'register-customer'}">
                                <ui:include src="sections/register-customer.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'customers'}">
                                <ui:include src="sections/customers.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'book-appointment'}">
                                <ui:include src="sections/book-appointment.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'payment'}">
                                <ui:include src="sections/payment.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{counterStaffBean.currentSection == 'appointments'}">
                                <ui:include src="sections/appointments.xhtml" />
                            </h:panelGroup>

                        </h:form>
                    </h:panelGroup>
                </div>
            </div>

        </div>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <p:commandButton value="Yes" type="button" styleClass="btn-danger ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="btn-secondary ui-confirmdialog-no" icon="pi pi-times" />
        </p:confirmDialog>
    </h:body>
</html>
