<?xml version="1.0" encoding="UTF-8"?>
<!--
    Technician Dashboard - shell only.

    Each sidebar item switches technicianBean.currentSection. The matching
    .xhtml fragment under /technician/sections/ is pulled in via <ui:include>.
    Service-reminder popup at the bottom is role-specific to technicians.
-->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <f:metadata>
        <f:event type="preRenderView" listener="#{technicianBean.init()}" />
    </f:metadata>

    <h:head>
        <title>Technician Dashboard - APU ASC</title>
        <h:outputStylesheet name="css/style.css" />
    </h:head>

    <h:body>
        <div class="dashboard">

            <!-- ==================== SIDEBAR ==================== -->
            <div class="sidebar">
                <div class="sidebar-brand">
                    <h2>APU-ASC</h2>
                    <span>Technician Portal</span>
                </div>

                <h:form id="sidebarForm">
                    <nav class="sidebar-nav">

                        <!-- Main -->
                        <div class="nav-section">Main</div>
                        <p:commandButton value="Overview"
                                         icon="pi pi-home"
                                         styleClass="nav-link #{technicianBean.currentSection == 'overview' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('overview')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="My Profile"
                                         icon="pi pi-id-card"
                                         styleClass="nav-link #{technicianBean.currentSection == 'profile' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('profile')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Work -->
                        <div class="nav-section">Work</div>
                        <p:commandButton value="My Appointments"
                                         icon="pi pi-calendar"
                                         styleClass="nav-link #{technicianBean.currentSection == 'appointments' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('appointments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Write Feedback"
                                         icon="pi pi-pencil"
                                         styleClass="nav-link #{technicianBean.currentSection == 'feedback' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('feedback')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Info -->
                        <div class="nav-section">Info</div>
                        <p:commandButton value="Customer Comments"
                                         icon="pi pi-comments"
                                         styleClass="nav-link #{technicianBean.currentSection == 'comments' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('comments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Performance"
                                         icon="pi pi-chart-bar"
                                         styleClass="nav-link #{technicianBean.currentSection == 'performance' ? 'active' : ''}"
                                         action="#{technicianBean.navigateTo('performance')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                    </nav>
                </h:form>

                <div class="sidebar-footer">
                    <span>#{loginBean.userName}</span>
                    <span>Technician</span>
                    <h:form>
                        <p:commandButton value="Logout"
                                         icon="pi pi-sign-out"
                                         styleClass="logout-btn"
                                         action="#{loginBean.logout()}" />
                    </h:form>
                </div>
            </div>

            <!-- ==================== MAIN CONTENT ==================== -->
            <div class="main-content">
                <div class="top-bar">
                    <h:panelGroup id="pageTitle" layout="block">
                        <h1>
                            <h:outputText value="Overview" rendered="#{technicianBean.currentSection == 'overview'}" />
                            <h:outputText value="My Profile" rendered="#{technicianBean.currentSection == 'profile'}" />
                            <h:outputText value="My Appointments" rendered="#{technicianBean.currentSection == 'appointments'}" />
                            <h:outputText value="Write Feedback" rendered="#{technicianBean.currentSection == 'feedback'}" />
                            <h:outputText value="Customer Comments" rendered="#{technicianBean.currentSection == 'comments'}" />
                            <h:outputText value="Performance" rendered="#{technicianBean.currentSection == 'performance'}" />
                        </h1>
                    </h:panelGroup>
                </div>

                <div class="content-area">
                    <h:panelGroup id="contentArea">
                        <p:growl id="growl" showDetail="true" life="4000" />
                        <h:form id="mainForm">

                            <!-- Each section is its own file under /technician/sections/.
                                 Only the one matching currentSection renders. -->

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'overview'}">
                                <ui:include src="sections/overview.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'profile'}">
                                <ui:include src="sections/profile.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'appointments'}">
                                <ui:include src="sections/appointments.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'feedback'}">
                                <ui:include src="sections/feedback.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'comments'}">
                                <ui:include src="sections/comments.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{technicianBean.currentSection == 'performance'}">
                                <ui:include src="sections/performance.xhtml" />
                            </h:panelGroup>

                        </h:form>
                    </h:panelGroup>
                </div>
            </div>

        </div>

        <!-- ==================== TODAY'S SERVICE REMINDER POPUP ==================== -->
        <p:dialog header="Today's Appointment Reminders"
                  widgetVar="serviceReminderDialog"
                  modal="true"
                  closable="true"
                  resizable="false"
                  draggable="false"
                  width="680"
                  styleClass="service-reminder-dialog"
                  rendered="#{not empty technicianBean.todayAppointmentsList}">
            <p:dataTable value="#{technicianBean.todayAppointmentsList}" var="a"
                         emptyMessage="No appointments today.">
                <p:column headerText="Time">
                    <h:outputText value="#{a.appointmentDateTime}" />
                </p:column>
                <p:column headerText="Customer">
                    <h:outputText value="#{a.customer != null ? a.customer.name : a.customerId}" />
                </p:column>
                <p:column headerText="Service">
                    <h:outputText value="#{a.service != null ? a.service.serviceName : a.serviceId}" />
                </p:column>
                <p:column headerText="Status">
                    <h:outputText value="#{a.status}" />
                </p:column>
            </p:dataTable>
        </p:dialog>

        <h:outputScript rendered="#{not empty technicianBean.todayAppointmentsList}">
            window.addEventListener('load', function () {
                if (typeof PF !== 'undefined' &amp;&amp; PF('serviceReminderDialog')) {
                    PF('serviceReminderDialog').show();
                }
            });
        </h:outputScript>
    </h:body>
</html>
