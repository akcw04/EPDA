<?xml version="1.0" encoding="UTF-8"?>
<!--
    Customer Dashboard - shell only.

    The sidebar below determines which section is "active" by setting
    customerBean.currentSection. Each section is a separate .xhtml file under
    /customer/sections/ and is pulled in via <ui:include>. Only the active
    panel is rendered, so component IDs inside includes never collide.
-->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <f:metadata>
        <f:event type="preRenderView" listener="#{customerBean.init()}" />
    </f:metadata>

    <h:head>
        <title>Customer Dashboard - APU ASC</title>
        <h:outputStylesheet name="css/style.css" />
    </h:head>

    <h:body>
        <div class="dashboard">

            <!-- ==================== SIDEBAR ==================== -->
            <div class="sidebar">
                <div class="sidebar-brand">
                    <h2>APU-ASC</h2>
                    <span>Customer Portal</span>
                </div>

                <h:form id="sidebarForm">
                    <nav class="sidebar-nav">

                        <!-- Main -->
                        <div class="nav-section">Main</div>
                        <p:commandButton value="Overview"
                                         icon="pi pi-home"
                                         styleClass="nav-link #{customerBean.currentSection == 'overview' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('overview')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="My Profile"
                                         icon="pi pi-id-card"
                                         styleClass="nav-link #{customerBean.currentSection == 'profile' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('profile')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- Appointments -->
                        <div class="nav-section">Appointments</div>
                        <p:commandButton value="My Appointments"
                                         icon="pi pi-calendar"
                                         styleClass="nav-link #{customerBean.currentSection == 'appointments' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('appointments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Services Catalog"
                                         icon="pi pi-list"
                                         styleClass="nav-link #{customerBean.currentSection == 'services' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('services')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />

                        <!-- History -->
                        <div class="nav-section">History</div>
                        <p:commandButton value="Payments"
                                         icon="pi pi-wallet"
                                         styleClass="nav-link #{customerBean.currentSection == 'payments' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('payments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Feedback"
                                         icon="pi pi-star"
                                         styleClass="nav-link #{customerBean.currentSection == 'feedback' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('feedback')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                        <p:commandButton value="Write Comment"
                                         icon="pi pi-comments"
                                         styleClass="nav-link #{customerBean.currentSection == 'comments' ? 'active' : ''}"
                                         action="#{customerBean.navigateTo('comments')}"
                                         update=":pageTitle :contentArea :sidebarForm"
                                         process="@this" />
                    </nav>
                </h:form>

                <div class="sidebar-footer">
                    <span>#{loginBean.userName}</span>
                    <span>Customer</span>
                    <h:form>
                        <p:commandButton value="Logout"
                                         icon="pi pi-sign-out"
                                         styleClass="logout-btn"
                                         action="#{loginBean.logout()}" />
                    </h:form>
                </div>
            </div>

            <!-- ==================== MAIN CONTENT ==================== -->
            <div class="main-content">
                <div class="top-bar">
                    <h:panelGroup id="pageTitle" layout="block">
                        <h1>
                            <h:outputText value="Overview" rendered="#{customerBean.currentSection == 'overview'}" />
                            <h:outputText value="My Profile" rendered="#{customerBean.currentSection == 'profile'}" />
                            <h:outputText value="My Appointments" rendered="#{customerBean.currentSection == 'appointments'}" />
                            <h:outputText value="Services Catalog" rendered="#{customerBean.currentSection == 'services'}" />
                            <h:outputText value="Payments" rendered="#{customerBean.currentSection == 'payments'}" />
                            <h:outputText value="Feedback" rendered="#{customerBean.currentSection == 'feedback'}" />
                            <h:outputText value="Write Comment" rendered="#{customerBean.currentSection == 'comments'}" />
                        </h1>
                    </h:panelGroup>
                </div>

                <div class="content-area">
                    <h:panelGroup id="contentArea">
                        <p:growl id="growl" showDetail="true" life="4000" />
                        <h:form id="mainForm">

                            <!-- Each section is its own file under /customer/sections/.
                                 Only the one matching currentSection renders. -->

                            <h:panelGroup rendered="#{customerBean.currentSection == 'overview'}">
                                <ui:include src="sections/overview.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'profile'}">
                                <ui:include src="sections/profile.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'appointments'}">
                                <ui:include src="sections/appointments.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'services'}">
                                <ui:include src="sections/services.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'payments'}">
                                <ui:include src="sections/payments.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'feedback'}">
                                <ui:include src="sections/feedback.xhtml" />
                            </h:panelGroup>

                            <h:panelGroup rendered="#{customerBean.currentSection == 'comments'}">
                                <ui:include src="sections/comments.xhtml" />
                            </h:panelGroup>

                        </h:form>
                    </h:panelGroup>
                </div>
            </div>

        </div>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <p:commandButton value="Yes" type="button" styleClass="btn-danger ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="btn-secondary ui-confirmdialog-no" icon="pi pi-times" />
        </p:confirmDialog>
    </h:body>
</html>
