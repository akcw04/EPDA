<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Connection Smoke Test</title>
    </h:head>
    <h:body>
        <h:form>
            <p:panel header="Jakarta EE 10 / GlassFish 8 Test">
                <h:panelGrid columns="1" cellpadding="5">
                    <h:outputText id="display" value="#{testBean.message}" 
                                  style="font-size: 1.5em; color: blue;" />
                    
                    <p:commandButton value="Click to Test Connection" 
                                     action="#{testBean.checkConnection}" 
                                     update="display" />
                </h:panelGrid>
            </p:panel>
        </h:form>
    </h:body>
</html>
